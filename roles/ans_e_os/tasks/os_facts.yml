# Print Os Facts
# Example online: https://docs.ansible.com/ansible/latest/playbook_guide/playbooks_vars_facts.html
# gather facts needs python module installed on the target
# access via:
# * ansible_facts['distribution']
# * or ansible_distribution

- name: Os Facts
  debug:
    msg:
      ansible_distribution: "{{ ansible_facts['distribution'] }}" # or ansible_facts['distribution']
      ansible_distribution_version: "{{ ansible_facts['distribution_version'] }}"
      ansible_distribution_major_version: "{{ ansible_facts['distribution_major_version'] }}"
      ansible_distribution_release: "{{ ansible_facts['distribution_release'] }}"
      ansible_kernel: "{{ ansible_facts['kernel'] }}"
      ansible_kernel_version: "{{ ansible_facts['kernel_version'] }}"
      # yum, dnf
      ansible_pkg_mgr: "{{ ansible_facts['pkg_mgr'] }}"
      # systemd, ...
      ansible_service_mgr: "{{ ansible_facts['service_mgr'] }}"
      ansible_os_family: "{{ ansible_facts['os_family'] }}"
      # Linux
      ansible_system: "{{ ansible_facts['system'] }}"
      # name.domain.tld
      ansible_fqdn: "{{ ansible_facts['fqdn'] }}"
      # The type of kvm
      ansible_virtualization_type: "{{ ansible_facts['virtualization_type'] }}"

